<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard SD Negeri Wonokerto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen">

<!-- Header -->
<header class="bg-blue-600 text-white py-6 shadow-md text-center">
  <h1 class="text-2xl md:text-3xl font-bold">~ SELAMAT DATANG ~</h1>
  <h2 class="text-xl md:text-2xl font-bold">DI APLIKASI SD NEGERI WONOKERTO</h2>
</header>

<!-- Menu Tab -->
<nav class="bg-white shadow-md py-3 px-6 flex flex-wrap justify-center gap-2 overflow-x-auto">
  <button onclick="showTable('satpam')" class="px-4 py-2 rounded-md hover:bg-blue-600 hover:text-white">🛡️ Satpam</button>
  <button onclick="showTable('pramuka')" class="px-4 py-2 rounded-md hover:bg-green-600 hover:text-white">🏕️ Pramuka</button>
  <button onclick="showTable('lks')" class="px-4 py-2 rounded-md hover:bg-yellow-500 hover:text-white">📘 LKS</button>
  <button onclick="showTable('amal')" class="px-4 py-2 rounded-md hover:bg-pink-500 hover:text-white">❤️ Amal</button>
  <button onclick="showTable('buku')" class="px-4 py-2 rounded-md hover:bg-purple-600 hover:text-white">📚 Buku</button>
  <button onclick="showTable('dapur')" class="px-4 py-2 rounded-md hover:bg-red-500 hover:text-white">🍳 Dapur</button>
  <button onclick="showTable('mbg')" class="px-4 py-2 rounded-md hover:bg-indigo-600 hover:text-white">🎶 MBG</button>
  <button onclick="showTable('perubahan')" class="px-4 py-2 rounded-md hover:bg-gray-600 hover:text-white">⚡ Perubahan</button>
</nav>

<!-- Ringkasan Total -->
<section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-6 max-w-6xl mx-auto">
  <div class="bg-green-100 rounded-lg p-4 text-center shadow-md">
    <h3 class="text-sm font-bold text-gray-700">Total Pemasukan</h3>
    <p class="text-xl font-extrabold text-green-600">Rp 0</p>
  </div>
  <div class="bg-red-100 rounded-lg p-4 text-center shadow-md">
    <h3 class="text-sm font-bold text-gray-700">Total Pengeluaran</h3>
    <p class="text-xl font-extrabold text-red-600">Rp 0</p>
  </div>
  <div class="bg-blue-100 rounded-lg p-4 text-center shadow-md">
    <h3 class="text-sm font-bold text-gray-700">Total Saldo</h3>
    <p class="text-xl font-extrabold text-blue-600">Rp 0</p>
  </div>
</section>

<!-- Contoh Tabel & Form Satpam -->
<section id="tabel-satpam" class="hidden max-w-6xl mx-auto px-4 sm:px-6 pb-10">
  <div class="bg-white shadow-lg rounded-lg overflow-x-auto w-full">
    <table class="min-w-full text-sm text-left text-gray-700">
      <thead class="bg-blue-600 text-white">
        <tr>
          <th class="px-4 py-2">Tanggal</th>
          <th class="px-4 py-2">Uraian</th>
          <th class="px-4 py-2">Quantity</th>
          <th class="px-4 py-2">H.Satuan</th>
          <th class="px-4 py-2">Jumlah</th>
          <th class="px-4 py-2">Kelas</th>
          <th class="px-4 py-2">Aksi</th>
        </tr>
      </thead>
      <tbody id="tbody-satpam"></tbody>
    </table>
  </div>
</section>

<section id="form-satpam" class="hidden max-w-6xl mx-auto px-4 sm:px-6 pb-10">
  <div class="bg-white shadow-lg rounded-lg p-6">
    <h3 class="text-lg font-bold mb-4 text-blue-600">Tambah Transaksi Satpam</h3>
    <form onsubmit="addTransaction(event,'satpam')">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="satpam-uraian" placeholder="Uraian" class="border rounded px-3 py-2" required>
        <input type="number" id="satpam-qty" placeholder="Quantity" class="border rounded px-3 py-2" required>
        <input type="text" id="satpam-hsatuan" placeholder="Harga Satuan" class="border rounded px-3 py-2" oninput="formatNumber(this)" required>
        <input type="text" id="satpam-jumlah" placeholder="Jumlah" class="border rounded px-3 py-2" oninput="formatNumber(this)" required>
        <select id="satpam-kelas" class="border rounded px-3 py-2">
          <option value="1A">1A</option><option value="1B">1B</option>
          <!-- dst -->
        </select>
      </div>
      <button type="submit" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Simpan</button>
    </form>
  </div>
</section>

<!-- Duplikasi pola di atas untuk Pramuka, LKS, Amal, Buku, Dapur, MBG, Perubahan -->
<!-- ... -->

<!-- Footer -->
<footer class="bg-blue-600 text-white text-center py-4 mt-auto">
  <p class="text-sm">&copy; 2026 | SD NEGERI WONOKERTO | KECAMATAN LEKSONO | 085323877778</p>
</footer>

<!-- Script generik -->
<script>
function showTable(category){
  document.querySelectorAll("section[id^='tabel-']").forEach(t=>t.classList.add("hidden"));
  document.querySelectorAll("section[id^='form-']").forEach(f=>f.classList.add("hidden"));
  document.getElementById("tabel-"+category).classList.remove("hidden");
}

function showForm(category){
  document.querySelectorAll("section[id^='form-']").forEach(f=>f.classList.add("hidden"));
  document.getElementById("form-"+category).classList.remove("hidden");
}

function formatNumber(input){
  let value=input.value.replace(/,/g,'');
  if(!isNaN(value)&&value!==''){input.value=Number(value).toLocaleString('en-US');}
}

function addTransaction(event,category){
  event.preventDefault();
  const today=new Date().toLocaleDateString('id-ID');
  const uraian=document.getElementById(category+"-uraian").value;
  const qty=document.getElementById(category+"-qty").value;
  const hsatuan=document.getElementById(category+"-hsatuan").value;
  const jumlah=document.getElementById(category+"-jumlah").value;
  const kelasField=document.getElementById(category+"-kelas");
  const kelas=kelasField?kelasField.value:"-";

  const tbody=document.getElementById("tbody-"+category);
  const row=document.createElement("tr");
  row.innerHTML=`
    <td>${today}</td><td>${uraian}</td><td>${qty}</td>
    <td>${hsatuan}</td><td>${jumlah}</td>
    ${kelasField?`<td>${kelas}</td>`:""}
    <td><select onchange="if(this.value==='Hapus'){this.closest('tr').remove();}">
      <option>Edit</option><option>Hapus</option></select></td>`;
  tbody.appendChild(row);
}
</script>

</body>
</html>
